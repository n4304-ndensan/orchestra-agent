x-mcp-server-env: &mcp-server-env
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  ORCHESTRA_MCP_CONFIG: /workspace/project/orchestra-agent.toml
  ORCHESTRA_MCP_WORKSPACE: /workspace/workspace

x-mcp-runtime: &mcp-runtime
  working_dir: /workspace/project
  volumes:
    - ./:/workspace/project
    - ./workspace:/workspace/workspace
  restart: unless-stopped

services:
  orchestra-mcp-files:
    <<: *mcp-runtime
    build:
      context: .
      dockerfile: docker/mcp-files-server/Dockerfile
    container_name: orchestra-mcp-files
    environment:
      <<: *mcp-server-env
    ports:
      - "8010:8010"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:8010/health'))['status'])",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  orchestra-mcp-excel:
    <<: *mcp-runtime
    build:
      context: .
      dockerfile: docker/mcp-excel-server/Dockerfile
    container_name: orchestra-mcp-excel
    environment:
      <<: *mcp-server-env
    ports:
      - "8020:8020"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:8020/health'))['status'])",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  orchestra-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestra-api
    command:
      [
        "orchestra-agent-api",
        "--config",
        "/workspace/project/orchestra-agent.toml",
        "--workspace",
        "/workspace/workspace",
      ]
    working_dir: /workspace/project
    volumes:
      - ./:/workspace/project
      - ./workspace:/workspace/workspace
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "9000:9000"
    restart: unless-stopped
    depends_on:
      orchestra-mcp-files:
        condition: service_healthy
      orchestra-mcp-excel:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:9000/health'))['status'])",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  orchestra-cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestra-cli
    profiles: ["cli"]
    entrypoint:
      [
        "orchestra-agent",
        "--config",
        "/workspace/project/orchestra-agent.toml",
        "--workspace",
        "/workspace/workspace",
      ]
    working_dir: /workspace/project
    volumes:
      - ./:/workspace/project
      - ./workspace:/workspace/workspace
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      orchestra-mcp-files:
        condition: service_healthy
      orchestra-mcp-excel:
        condition: service_healthy
