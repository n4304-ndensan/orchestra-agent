services:
  orchestra-mcp-files:
    build:
      context: ../..
      dockerfile: docker/mcp-files-server/Dockerfile
    container_name: orchestra-mcp-files
    working_dir: /workspace/project
    init: true
    volumes:
      - ../../:/workspace/project
      - ../../workspace:/workspace/workspace
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ORCHESTRA_MCP_CONFIG: /workspace/project/orchestra-agent.toml
      ORCHESTRA_MCP_WORKSPACE: /workspace/workspace
      ORCHESTRA_MCP_LOG_LEVEL: ${ORCHESTRA_MCP_LOG_LEVEL:-INFO}
    ports:
      - "${ORCHESTRA_PUBLISH_HOST:-127.0.0.1}:${ORCHESTRA_MCP_FILES_PORT:-8010}:8010"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:8010/health'))['status'])",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
