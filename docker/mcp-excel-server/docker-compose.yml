services:
  orchestra-mcp-excel:
    build:
      context: ../..
      dockerfile: docker/mcp-excel-server/Dockerfile
    container_name: orchestra-mcp-excel
    working_dir: /workspace/project
    init: true
    volumes:
      - ../../:/workspace/project
      - ../../workspace:/workspace/workspace
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      WORKSPACE_ROOT: /workspace/workspace
      EXCEL_MCP_CONFIG: ${EXCEL_MCP_CONFIG:-}
      EXCEL_MCP_REMOTE_ENABLED: ${EXCEL_MCP_REMOTE_ENABLED:-false}
      EXCEL_MCP_AUDIT_DIR: /workspace/workspace/.orchestra_state/audit
      EXCEL_MCP_BACKUP_DIR: /workspace/workspace/.excel_mcp_backups
      ORCHESTRA_MCP_CONFIG: /workspace/project/orchestra-agent.toml
      ORCHESTRA_MCP_WORKSPACE: /workspace/workspace
      ORCHESTRA_MCP_LOG_LEVEL: ${ORCHESTRA_MCP_LOG_LEVEL:-INFO}
    ports:
      - "${ORCHESTRA_PUBLISH_HOST:-127.0.0.1}:${ORCHESTRA_MCP_EXCEL_PORT:-8020}:8020"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:8020/health'))['status'])",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
