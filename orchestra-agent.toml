[workspace]
root = "./workspace"
workflow_root = "workflow"
plan_root = "plan"
snapshots_dir = ".orchestra_snapshots"
state_root = ".orchestra_state/runs"
audit_root = ".orchestra_state/audit"

[mcp]
name = "orchestra-automation"
transport = "http"
host = "0.0.0.0"
port = 8000
path = "/mcp"
tool_group = "all"

[[mcp.servers]]
name = "files"
transport = "http"
host = "0.0.0.0"
port = 8010
path = "/mcp"
tool_group = "files"
endpoint = "http://orchestra-mcp-files:8010/mcp"

[[mcp.servers]]
name = "excel"
transport = "http"
host = "0.0.0.0"
port = 8020
path = "/mcp"
tool_group = "excel"
endpoint = "http://orchestra-mcp-excel:8020/mcp"

[api]
host = "0.0.0.0"
port = 9000

[llm]
# Set to "openai" or "google" for full AI-controlled planning and MCP runtime orchestration.
provider = "google"
planner_mode = "full"
openai_model = "gpt-4.1-mini"
openai_api_key_env = "OPENAI_API_KEY"
openai_base_url = "https://api.openai.com"
openai_timeout = 60.0
google_model = "gemini-2.5-flash"
google_api_key_env = "GEMINI_API_KEY"
google_base_url = "https://generativelanguage.googleapis.com"
google_timeout = 60.0
# For company TLS inspection environments, set your corporate CA bundle path.
# Example: tls_ca_bundle = "./certs/company.crt"
# tls_ca_bundle = "./certs/company.crt"
temperature = 0.0
max_tokens = 1200

[runtime]
workflow_name = "Automation Workflow"
auto_approve = false
interactive_approval = true
max_resume = 50
print_plan = true
repair_max_attempts = 3
