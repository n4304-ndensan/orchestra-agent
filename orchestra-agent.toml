[workspace]
root = "./workspace"
workflow_root = "workflow"
plan_root = "plan"
snapshots_dir = ".orchestra_snapshots"
state_root = ".orchestra_state/runs"
audit_root = ".orchestra_state/audit"

[mcp]
name = "orchestra-automation"
transport = "http"
host = "127.0.0.1"
port = 8000
path = "/mcp"
tool_group = "all"

[[mcp.servers]]
name = "files"
transport = "http"
host = "127.0.0.1"
port = 8010
path = "/mcp"
tool_group = "files"
endpoint = "http://127.0.0.1:8010/mcp"

[[mcp.servers]]
name = "excel"
transport = "http"
host = "127.0.0.1"
port = 8020
path = "/mcp"
tool_group = "excel"
endpoint = "http://127.0.0.1:8020/mcp"

[api]
host = "127.0.0.1"
port = 9000

[llm]
# Private-use browser-backed ChatGPT custom GPT integration.
# This mode does not use OPENAI_API_KEY / GEMINI_API_KEY.
provider = "chatgpt_playwright"
provider_modules = ["orchestra_agent.adapters.llm.chatgpt_playwright_provider"]
planner_mode = "full"
# Natural-language system prompts: en / ja / zh / es / vi
language = "ja"
# Enable only for chat-style providers that really remember prior turns across requests.
remembers_context = false
chatgpt_url = "https://chatgpt.com/g/g-69919f16473081918e2c40de0c8be30f-shikiho-image-json-extractor"
chatgpt_chrome_path = "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
chatgpt_profile_dir = "./.chatgpt-profile"
chatgpt_port = 9222
# Alternative providers remain available when switching provider back to "openai" or "google".
openai_model = "gpt-4.1-mini"
openai_api_key_env = "OPENAI_API_KEY"
openai_base_url = "https://api.openai.com"
openai_timeout = 60.0
google_model = "gemini-2.5-flash"
google_api_key_env = "GEMINI_API_KEY"
google_base_url = "https://generativelanguage.googleapis.com"
google_timeout = 60.0
# For company TLS inspection environments, set your corporate CA bundle path.
# Example: tls_ca_bundle = "./certs/company.crt"
# tls_ca_bundle = "./certs/company.crt"
temperature = 0.0
max_tokens = 1200

[runtime]
workflow_name = "Automation Workflow"
auto_approve = false
interactive_approval = true
max_resume = 50
print_plan = true
repair_max_attempts = 3
